# Scheduled Services deployment playbook for spot (https://github.com/umputun/spot)
#
# Usage:
#   cd /path/to/scheduled-services
#   spot -p playbook.main.yaml -E env.<host>-main.yml
#
# Environment variables per service (defined in env file):
#   <PREFIX>_ENABLED: "true"/"false"       - enable deployment
#   <PREFIX>_SERVICE_CONFIG: |             - raw YAML for config.yaml
#   <PREFIX>_CRON_SCHEDULE: |              - raw crontab entries (linux services)
#   <PREFIX>_LAUNCHD_SCHEDULE: |           - launchd schedule entries (macOS services)
#
# Platform requirements:
#   news-digest      — Linux only  (cron)
#   pr-auto-approve  — macOS only  (launchd)
#   slack-summary    — macOS only  (launchd)
#   teams-summary    — macOS only  (launchd)
#
# Services: news-digest (NEWS_DIGEST), slack-summary (SLACK_SUMMARY),
#           pr-auto-approve (PR_AUTO_APPROVE), teams-summary (TEAMS_SUMMARY)

user: rt
inventory: inventory.yml
local_shell: /bin/bash

targets:
  all_hosts: {groups: ["homelab", "gear"]}

tasks:
  # ── Preflight ──────────────────────────────────────────────
  - name: preflight
    commands:
      - name: verify-playbook-dir
        script: |
          if [[ ! -d common/helpers ]]; then
            echo "ERROR: run this playbook from the scheduled-services directory" >&2
            exit 1
          fi
        options: {local: true}

      - name: compute-deploy-version
        script: |
          version=$(git log -1 --format='%h@%cs' -- . 2>/dev/null || echo "unknown")
          [[ -z "$version" ]] && version="unknown"
          echo "$version" > /tmp/.sched-svc-version
          echo "Deploy version: $version"
        options: {local: true}

  # ── Platform Checks ────────────────────────────────────────
  - name: platform-checks
    on_error: &on_error |
      /bin/bash -c 'source ~/.bash.d/telegram.bash 2>/dev/null || source ~/.zsh.d/telegram.zsh 2>/dev/null; tg "⛔ *{SPOT_REMOTE_NAME}* — _scheduled-services_ failed at {SPOT_TASK}"' || true
    commands:
      - name: check-platform-requirements
        script: |
          os=$(uname -s)
          errors=()
          for entry in news-digest:NEWS_DIGEST:Linux pr-auto-approve:PR_AUTO_APPROVE:Darwin slack-summary:SLACK_SUMMARY:Darwin teams-summary:TEAMS_SUMMARY:Darwin; do
            svc="${entry%%:*}"; rest="${entry#*:}"; prefix="${rest%%:*}"; required="${rest##*:}"
            ev="${prefix}_ENABLED"
            [[ "${!ev:-false}" == "true" && "$os" != "$required" ]] && errors+=("$svc requires $required but target is $os")
          done
          [[ ${#errors[@]} -gt 0 ]] && printf 'ERROR: %s\n' "${errors[@]}" >&2 && exit 1
          echo "Platform checks passed ($os)"

  # ── Validate Dependencies ──────────────────────────────────
  - name: validate-deps
    on_error: *on_error
    commands:
      - name: copy-bindeps
        copy:
          - {src: "services/news-digest/.bindeps", dst: "/tmp/.bindeps-news-digest"}
          - {src: "services/slack-summary/.bindeps", dst: "/tmp/.bindeps-slack-summary"}
          - {src: "services/pr-auto-approve/.bindeps", dst: "/tmp/.bindeps-pr-auto-approve"}
          - {src: "services/teams-summary/.bindeps", dst: "/tmp/.bindeps-teams-summary"}
        on_exit: "rm -f /tmp/.bindeps-news-digest /tmp/.bindeps-slack-summary /tmp/.bindeps-pr-auto-approve /tmp/.bindeps-teams-summary"

      - name: check-required-tools
        script: |
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          missing=()
          for tool in uv python3 rsync claude codex; do command -v "$tool" &>/dev/null || missing+=("$tool"); done
          for svc in news-digest slack-summary pr-auto-approve teams-summary; do
            prefix=$(echo "$svc" | tr '[:lower:]-' '[:upper:]_'); ev="${prefix}_ENABLED"
            [[ "${!ev:-false}" != "true" || ! -f "/tmp/.bindeps-${svc}" ]] && continue
            while IFS= read -r dep || [[ -n "$dep" ]]; do dep="${dep## }"; dep="${dep%% }"
              [[ -n "$dep" && "$dep" != \#* ]] && ! command -v "$dep" &>/dev/null && missing+=("$dep ($svc)")
            done < "/tmp/.bindeps-${svc}"
          done
          [[ ${#missing[@]} -eq 0 ]] && echo "All required tools present" || { printf 'ERROR: missing %s\n' "${missing[@]}" >&2; exit 1; }

  # ── Deploy Files ───────────────────────────────────────────
  - name: deploy-files
    on_error: *on_error
    commands:
      - name: sync-project
        sync:
          src: "."
          dst: "/tmp/.sched-svc-deploy/"
          exclude: ["__pycache__", ".venv", ".git", ".ruff_cache", ".ralphex",
                    "docs", "scripts/migrate.sh", ".pre-commit-config.yaml",
                    "CLAUDE.md", "README.md", "env.*", "playbook.*"]
        on_exit: "rm -rf /tmp/.sched-svc-deploy/"

      - name: install-project-files
        script: |
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          mkdir -p ~/.scheduled-services
          rsync -a --delete \
            --exclude='__pycache__' --exclude='*.pyc' --exclude='config.yaml' \
            --exclude='.version' --exclude='.lock' --exclude='reviews.md' \
            --exclude='user-cache.txt' --exclude='.venv' \
            /tmp/.sched-svc-deploy/ ~/.scheduled-services/

      - name: deploy-version
        copy: {src: "/tmp/.sched-svc-version", dst: "/tmp/.sched-svc-version"}
        on_exit: "rm -f /tmp/.sched-svc-version"

      - name: install-version
        script: |
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          version=$(cat /tmp/.sched-svc-version 2>/dev/null || echo "unknown")
          echo "$version" > ~/.scheduled-services/.version
          echo "Deployed version: $version"

  # ── Setup Virtual Environment ──────────────────────────────
  - name: setup-venv
    on_error: *on_error
    commands:
      - name: uv-sync
        script: |
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          cd ~/.scheduled-services && uv sync --native-tls

  # ── Generate Configs ───────────────────────────────────────
  - name: generate-configs
    on_error: *on_error
    commands:
      - name: write-service-configs
        script: |
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          cd ~/.scheduled-services && uv run python scripts/write_configs.py \
            --base-dir ~/.scheduled-services \
            news-digest:NEWS_DIGEST slack-summary:SLACK_SUMMARY \
            pr-auto-approve:PR_AUTO_APPROVE teams-summary:TEAMS_SUMMARY

  # ── Configure Scheduling ──────────────────────────────────
  #
  # Linux services (news-digest): crontab entries
  # macOS services (pr-auto-approve, slack-summary, teams-summary): launchd plists
  #
  - name: configure-crontab
    on_error: *on_error
    commands:
      - name: update-crontab
        script: |
          [[ "$(uname -s)" != "Linux" ]] && echo "Skipping crontab (not Linux)" && exit 0
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          cd ~/.scheduled-services && uv run python scripts/install_crontab.py \
            news-digest:NEWS_DIGEST

  - name: configure-launchd
    on_error: *on_error
    commands:
      - name: install-launchd-agents
        script: |
          [[ "$(uname -s)" != "Darwin" ]] && echo "Skipping launchd (not macOS)" && exit 0
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          cd ~/.scheduled-services && uv run python scripts/install_launchd.py \
            --template templates/launchd.plist.tpl \
            --agents-dir "$HOME/Library/LaunchAgents" \
            --prefix-tag com.scheduled-services \
            slack-summary:SLACK_SUMMARY pr-auto-approve:PR_AUTO_APPROVE \
            teams-summary:TEAMS_SUMMARY

  # ── Completion Notification ────────────────────────────────
  - name: notify-completion
    commands:
      - name: send-completion-notification
        script: |
          export PATH="$HOME/.local/bin:$HOME/.bin:/opt/homebrew/bin:/snap/bin:$PATH"
          for f in ~/.bash.d/telegram.bash ~/.zsh.d/telegram.zsh; do [ -f "$f" ] && . "$f" && tg_loaded=true && break; done
          ${tg_loaded:-false} || exit 0
          name="{SPOT_REMOTE_NAME}"; [ -z "$name" ] && name=$(hostname -s)
          ver=$(cat ~/.scheduled-services/.version 2>/dev/null || echo "unknown")
          enabled=""
          for sp in NEWS_DIGEST:news-digest SLACK_SUMMARY:slack-summary PR_AUTO_APPROVE:pr-auto-approve TEAMS_SUMMARY:teams-summary; do
            ev="${sp%%:*}_ENABLED"; svc="${sp##*:}"; [[ "${!ev:-false}" == "true" ]] && enabled="$enabled$svc "
          done
          enabled="${enabled% }"
          tg "✅ *${name}* — _scheduled-services_ deployed (${ver}): ${enabled:-none}" || true
