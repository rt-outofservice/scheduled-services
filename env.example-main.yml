vars:

  # #################### SERVICE: news-digest ##############################

  # Enable deployment of this service ("true" / "false")
  NEWS_DIGEST_ENABLED: "true"

  # Raw YAML written verbatim to services/news-digest/config.yaml
  # Supports multiple feed groups with per-group lang/mode/hours settings.
  # Each group can be targeted independently via --digest-names CLI argument.
  NEWS_DIGEST_SERVICE_CONFIG: |
    hostname: myhost
    llm_model: haiku
    feeds:
      us-politics:
        lang: en
        mode: detailed
        hours: 12
        feeds:
          - name: "Fox News Politics"
            url: "https://moxie.foxnews.com/google-publisher/politics.xml"
          - name: "NPR Politics"
            url: "https://feeds.npr.org/1014/rss.xml"
          - name: "The Hill"
            url: "https://thehill.com/feed/"
          - name: "BBC US/Canada"
            url: "http://feeds.bbci.co.uk/news/world/us_and_canada/rss.xml"
      ru-politics:
        lang: ru
        mode: detailed
        hours: 12
        feeds:
          - name: "Meduza"
            url: "https://meduza.io/rss/all"
          - name: "TASS"
            url: "https://tass.com/rss/v2.xml"
      it:
        lang: en
        mode: detailed
        hours: 24
        feeds:
          - name: "Hacker News"
            url: "https://news.ycombinator.com/rss"
          - name: "Ars Technica"
            url: "https://feeds.arstechnica.com/arstechnica/index"
      sports:
        lang: en
        mode: summary
        hours: 24
        feeds:
          - name: "BBC Sport Football"
            url: "https://feeds.bbci.co.uk/sport/football/rss.xml"
          - name: "ESPN NHL"
            url: "https://www.espn.com/espn/rss/nhl/news"
        subcategories:
          "EU Soccer": ["BBC Sport Football"]
          "NHL": ["ESPN NHL"]

  # Raw crontab entries for news-digest.
  # Multiple entries allow different digest groups at different times.
  # Each line: standard 5-field cron expression + command.
  NEWS_DIGEST_CRON_SCHEDULE: |
    0 6 * * 1-5 cd ~/.scheduled-services && uv run python services/news-digest/news_digest.py --digest-names us-politics,it,sports
    0 18 * * * cd ~/.scheduled-services && uv run python services/news-digest/news_digest.py --digest-names us-politics,ru-politics

  # #################### SERVICE: pr-auto-approve (macOS only) ##############

  PR_AUTO_APPROVE_ENABLED: "true"

  # Raw YAML written verbatim to services/pr-auto-approve/config.yaml
  PR_AUTO_APPROVE_SERVICE_CONFIG: |
    hostname: myhost
    llm_provider: codex
    llm_model: gpt-5.4
    llm_model_effort: xhigh
    targets:
      - provider: github
        org: MyOrg
        filters:
          include_only: ["infra-"]
          exclude: ["archived-"]
      - provider: gitlab
        org: MyGitLabGroup
    skip_bots: true
    cli_wrappers:
      glab: true          # glab in PATH supports --start-proxy/--stop-proxy
    approval_cap: 2

  # LaunchD schedule (macOS). YAML list — each item becomes its own LaunchAgent.
  # Fields: command (shell command), schedule (StartCalendarInterval entries).
  # Array values are expanded: Weekday: [1,2,3,4,5] creates one entry per weekday.
  # Omit a field (e.g. Hour) to mean "every" (same as * in cron).
  # Regular reviews every 30 min on weekdays + end-of-day summary at 20:05
  PR_AUTO_APPROVE_LAUNCHD_SCHEDULE: |
    - command: "cd ~/.scheduled-services && uv run python services/pr-auto-approve/pr_auto_approve.py"
      schedule:
        - {Minute: [0, 30], Weekday: [1,2,3,4,5]}
    - command: "cd ~/.scheduled-services && uv run python services/pr-auto-approve/pr_auto_approve.py --day-summary-only"
      schedule:
        - {Minute: 5, Hour: 20, Weekday: [1,2,3,4,5]}

  # #################### SERVICE: teams-summary (macOS only) ################

  TEAMS_SUMMARY_ENABLED: "true"

  # Raw YAML written verbatim to services/teams-summary/config.yaml
  # Reads pre-existing MS Teams JSON dumps and summarizes via AI.
  # Supports summary mode (default) and notify-on-match mode (keyword monitoring).
  TEAMS_SUMMARY_SERVICE_CONFIG: |
    hostname: myhost
    data_dir: /path/to/teams/json-dumps
    timeframe: "14h"
    channels:
      - general
      - engineering
    ignore_files_smaller_than_bytes: 500
    llm_provider: claude
    llm_model: haiku

  # LaunchD schedule (macOS). Morning + evening summaries on weekdays,
  # plus hourly keyword monitoring to catch mentions and send notifications.
  TEAMS_SUMMARY_LAUNCHD_SCHEDULE: |
    - command: "cd ~/.scheduled-services && uv run python services/teams-summary/teams_summary.py"
      schedule:
        - {Minute: 30, Hour: 6, Weekday: [1,2,3,4,5]}
        - {Minute: 0, Hour: 18, Weekday: [1,2,3,4,5]}
    - command: "cd ~/.scheduled-services && uv run python services/teams-summary/teams_summary.py --notify-on-match 'roman,tishchenko,roman t,kb,rt,request tracker,knowledge base,outage,incident,escalation,aws connect,connect flow'"
      schedule:
        - {Minute: 0, Weekday: [1,2,3,4,5]}

  # #################### SERVICE: slack-summary (macOS only) ################

  SLACK_SUMMARY_ENABLED: "true"

  # Raw YAML written verbatim to services/slack-summary/config.yaml
  SLACK_SUMMARY_SERVICE_CONFIG: |
    hostname: myhost
    channels:
      - C01ABCDEF
      - C02GHIJKL
    timeframe: "14h"
    user_id: U00EXAMPLE

  # LaunchD schedule (macOS). Morning and evening summaries on weekdays.
  SLACK_SUMMARY_LAUNCHD_SCHEDULE: |
    - command: "cd ~/.scheduled-services && uv run python services/slack-summary/slack_summary.py"
      schedule:
        - {Minute: 30, Hour: 6, Weekday: [1,2,3,4,5]}
        - {Minute: 0, Hour: 18, Weekday: [1,2,3,4,5]}
